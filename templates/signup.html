{% extends "base.html" %}
{% block title %}Sign Up — MedTracker{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5">
    <div class="text-center mb-4">
      <div style="font-size:3rem">💊</div>
      <h2 class="fw-bold">Create Account</h2>
      <p class="text-muted">Track your medications with ease</p>
    </div>
    <div class="card p-4">
      <form method="POST" action="{{ url_for('signup') }}" novalidate>
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" name="name" placeholder="Jane Doe" required
                 value="{{ request.form.get('name', '') }}"/>
        </div>
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" name="email" placeholder="you@email.com" required
                 value="{{ request.form.get('email', '') }}"/>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" name="password" placeholder="Min. 6 characters" required/>
        </div>
        <div class="mb-4">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-control" name="confirm_password" placeholder="Repeat password" required/>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">Create Account →</button>
      </form>
    </div>
    <p class="text-center text-muted mt-3">
      Already have an account?
      <a href="{{ url_for('login') }}" class="text-decoration-none" style="color:#6c9cff">Sign In</a>
    </p>
  </div>
</div>
{% endblock %}
