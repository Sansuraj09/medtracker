{% extends "base.html" %}
{% block title %}Edit {{ med.name }} — MedTracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="d-flex align-items-center gap-3 mb-4">
      <a href="{{ url_for('dashboard') }}" class="btn btn-sm btn-outline-secondary">← Back</a>
      <h3 class="fw-bold mb-0">Edit — {{ med.name }}</h3>
    </div>
    <div class="card p-4">
      <form method="POST" action="{{ url_for('edit_medicine', med_id=med.id) }}">
        {% include '_med_form.html' %}
        <div class="d-flex gap-2 justify-content-end">
          <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
          <button type="submit" class="btn btn-success fw-bold">Save Changes ✓</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
