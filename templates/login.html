{% extends "base.html" %}
{% block title %}Sign In — MedTracker{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5">
    <div class="text-center mb-4">
      <div style="font-size:3rem">💊</div>
      <h2 class="fw-bold">Welcome Back</h2>
      <p class="text-muted">Sign in to your medicine tracker</p>
    </div>
    <div class="card p-4">
      <form method="POST" action="{{ url_for('login') }}" novalidate>
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" name="email" placeholder="you@email.com" required
                 value="{{ request.form.get('email', '') }}"/>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" name="password" placeholder="Your password" required/>
        </div>
        <div class="mb-4 form-check">
          <input type="checkbox" class="form-check-input" name="remember" id="remember"/>
          <label class="form-check-label text-muted" for="remember">Remember me</label>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">Sign In →</button>
      </form>
    </div>
    <p class="text-center text-muted mt-3">
      New here?
      <a href="{{ url_for('signup') }}" class="text-decoration-none" style="color:#6c9cff">Create account</a>
    </p>
  </div>
</div>
{% endblock %}
